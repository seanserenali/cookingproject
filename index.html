<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChefMagic | Creative Recipe Generator</title>
    <meta name="description" content="Turn your remaining ingredients into gourmet recipes instantly with ChefMagic.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="bg-blob"></div>
    <div class="bg-blob-2"></div>

    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ChefMagic</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Generator</a>
                <a href="prepicked.html" class="nav-link">Pre-Picked</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 2rem;">
        <header>
            <h1>ChefMagic</h1>
            <p class="subtitle">Enter the ingredients you have, and let magic happen.</p>
        </header>

        <main>
            <section class="glass-card">
                <datalist id="ingredient-suggestions"></datalist>

                <div class="multi-input-grid">
                    <!-- Proteins -->
                    <div class="input-group category-group" data-category="proteins">
                        <h3>Proteins</h3>
                        <div class="input-field-wrapper">
                            <input type="text" id="input-proteins" placeholder="e.g. Chicken, Beef, Tofu..."
                                data-cat="proteins" list="ingredient-suggestions">
                            <button class="primary-btn add-btn" data-cat="proteins"> Add </button>
                        </div>
                        <div class="ingredients-list" id="list-proteins"></div>
                        <div class="suggested-ingredients" style="margin-top: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                            <span style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; display: block; margin-bottom: 0.5rem;">Suggestions</span>
                            <div class="category-chips">
                                <button class="suggestion-chip">Chicken</button>
                                <button class="suggestion-chip">Beef</button>
                                <button class="suggestion-chip">Shrimp</button>
                                <button class="suggestion-chip">Salmon</button>
                                <button class="suggestion-chip">Bacon</button>
                                <button class="suggestion-chip">Tofu</button>
                                <button class="suggestion-chip">Pork</button>
                                <button class="suggestion-chip">Egg</button>
                                <button class="suggestion-chip">Turkey</button>
                                <button class="suggestion-chip">Lamb</button>
                                <button class="suggestion-chip">Tuna</button>
                                <button class="suggestion-chip">Cod</button>
                                <button class="suggestion-chip">Duck</button>
                                <button class="suggestion-chip">Lentils</button>
                                <button class="suggestion-chip">Chickpeas</button>
                            </div>
                        </div>
                    </div>

                    <!-- Carbs & Dairy -->
                    <div class="input-group category-group" data-category="carbs">
                        <h3>Carbs & Dairy</h3>
                        <div class="input-field-wrapper">
                            <input type="text" id="input-carbs" placeholder="e.g. Pasta, Rice, Cheese..."
                                data-cat="carbs" list="ingredient-suggestions">
                            <button class="primary-btn add-btn" data-cat="carbs"> Add </button>
                        </div>
                        <div class="ingredients-list" id="list-carbs"></div>
                        <div class="suggested-ingredients" style="margin-top: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                            <span style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; display: block; margin-bottom: 0.5rem;">Suggestions</span>
                            <div class="category-chips">
                                <button class="suggestion-chip">Pasta</button>
                                <button class="suggestion-chip">Rice</button>
                                <button class="suggestion-chip">Quinoa</button>
                                <button class="suggestion-chip">Flour</button>
                                <button class="suggestion-chip">Cheese</button>
                                <button class="suggestion-chip">Milk</button>
                                <button class="suggestion-chip">Cream</button>
                                <button class="suggestion-chip">Cornstarch</button>
                                <button class="suggestion-chip">Bread</button>
                                <button class="suggestion-chip">Oats</button>
                                <button class="suggestion-chip">Couscous</button>
                                <button class="suggestion-chip">Greek Yogurt</button>
                                <button class="suggestion-chip">Parmesan</button>
                                <button class="suggestion-chip">Feta</button>
                                <button class="suggestion-chip">Mozzarella</button>
                            </div>
                        </div>
                    </div>

                    <!-- Veggies & Fruits -->
                    <div class="input-group category-group" data-category="veggies">
                        <h3>Veggies & Fruits</h3>
                        <div class="input-field-wrapper">
                            <input type="text" id="input-veggies" placeholder="e.g. Broccoli, Tomato, Apple..."
                                data-cat="veggies" list="ingredient-suggestions">
                            <button class="primary-btn add-btn" data-cat="veggies"> Add </button>
                        </div>
                        <div class="ingredients-list" id="list-veggies"></div>
                        <div class="suggested-ingredients" style="margin-top: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                            <span style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; display: block; margin-bottom: 0.5rem;">Suggestions</span>
                            <div class="category-chips">
                                <button class="suggestion-chip">Tomato</button>
                                <button class="suggestion-chip">Onion</button>
                                <button class="suggestion-chip">Mushroom</button>
                                <button class="suggestion-chip">Spinach</button>
                                <button class="suggestion-chip">Broccoli</button>
                                <button class="suggestion-chip">Bell Pepper</button>
                                <button class="suggestion-chip">Zucchini</button>
                                <button class="suggestion-chip">Carrot</button>
                                <button class="suggestion-chip">Potato</button>
                                <button class="suggestion-chip">Avocado</button>
                                <button class="suggestion-chip">Lemon</button>
                                <button class="suggestion-chip">Kale</button>
                                <button class="suggestion-chip">Asparagus</button>
                                <button class="suggestion-chip">Eggplant</button>
                                <button class="suggestion-chip">Sweet Potato</button>
                                <button class="suggestion-chip">Cucumber</button>
                                <button class="suggestion-chip">Celery</button>
                                <button class="suggestion-chip">Corn</button>
                                <button class="suggestion-chip">Peas</button>
                                <button class="suggestion-chip">Lime</button>
                                <button class="suggestion-chip">Apple</button>
                                <button class="suggestion-chip">Mango</button>
                            </div>
                        </div>
                    </div>

                    <!-- Fats & Flavors -->
                    <div class="input-group category-group" data-category="flavors">
                        <h3>Fats & Flavors</h3>
                        <div class="input-field-wrapper">
                            <input type="text" id="input-flavors" placeholder="e.g. Olive Oil, Garlic, Basil..."
                                data-cat="flavors" list="ingredient-suggestions">
                            <button class="primary-btn add-btn" data-cat="flavors"> Add </button>
                        </div>
                        <div class="ingredients-list" id="list-flavors"></div>
                        <div class="suggested-ingredients" style="margin-top: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                            <span style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; display: block; margin-bottom: 0.5rem;">Suggestions</span>
                            <div class="category-chips">
                                <button class="suggestion-chip">Garlic</button>
                                <button class="suggestion-chip">Olive Oil</button>
                                <button class="suggestion-chip">Butter</button>
                                <button class="suggestion-chip">Salt</button>
                                <button class="suggestion-chip">Black Pepper</button>
                                <button class="suggestion-chip">Basil</button>
                                <button class="suggestion-chip">Cilantro</button>
                                <button class="suggestion-chip">Ginger</button>
                                <button class="suggestion-chip">Honey</button>
                                <button class="suggestion-chip">Soy Sauce</button>
                                <button class="suggestion-chip">Chili</button>
                                <button class="suggestion-chip">Sriracha</button>
                                <button class="suggestion-chip">Pesto</button>
                                <button class="suggestion-chip">Cumin</button>
                                <button class="suggestion-chip">Paprika</button>
                                <button class="suggestion-chip">Oregano</button>
                                <button class="suggestion-chip">Thyme</button>
                                <button class="suggestion-chip">Rosemary</button>
                                <button class="suggestion-chip">Turmeric</button>
                                <button class="suggestion-chip">Sesame Oil</button>
                                <button class="suggestion-chip">Balsamic Vinegar</button>
                                <button class="suggestion-chip">Mustard</button>
                                <button class="suggestion-chip">Maple Syrup</button>
                            </div>
                        </div>
                    </div>

                    <!-- Misc -->
                    <div class="input-group category-group" data-category="misc">
                        <h3>Miscellaneous</h3>
                        <div class="input-field-wrapper">
                            <input type="text" id="input-misc" placeholder="e.g. Water, Wine, Broth..."
                                data-cat="misc" list="ingredient-suggestions">
                            <button class="primary-btn add-btn" data-cat="misc"> Add </button>
                        </div>
                        <div class="ingredients-list" id="list-misc"></div>
                        <div class="suggested-ingredients" style="margin-top: 0.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
                            <span style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; display: block; margin-bottom: 0.5rem;">Suggestions</span>
                            <div class="category-chips">
                                <button class="suggestion-chip">Broth</button>
                                <button class="suggestion-chip">White Wine</button>
                                <button class="suggestion-chip">Red Wine</button>
                                <button class="suggestion-chip">Water</button>
                                <button class="suggestion-chip">Cooking Spray</button>
                                <button class="suggestion-chip">Baking Powder</button>
                                <button class="suggestion-chip">Yeast</button>
                                <button class="suggestion-chip">Baking Soda</button>
                                <button class="suggestion-chip">Vanilla Extract</button>
                                <button class="suggestion-chip">Sugar</button>
                                <button class="suggestion-chip">Brown Sugar</button>
                                <button class="suggestion-chip">Cocoa Powder</button>
                                <button class="suggestion-chip">Coconut Milk</button>
                                <button class="suggestion-chip">Soy Milk</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Subtype Selection Modal (Hidden by default) -->
                <div id="subtype-modal" class="modal-overlay hidden">
                    <div class="modal-content glass-card">
                        <h3 id="subtype-title">Which type of Pasta?</h3>
                        <div class="subtype-options" id="subtype-options">
                            <!-- Options injected here -->
                        </div>
                        <button id="cancel-subtype" class="text-btn" style="margin-top: 1rem;">Cancel</button>
                    </div>
                </div>

                <div style="display: flex; justify-content: center; margin-top: 1rem;">
                    <button class="primary-btn" id="generate-btn"
                        style="padding: 1.25rem 3rem; font-size: 1.1rem; gap: 0.75rem;">
                        <span>Generate Recipe</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 0 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 0-1.275-1.275L12 3Z">
                            </path>
                            <path d="M5 3v4"></path>
                            <path d="M19 17v4"></path>
                            <path d="M3 5h4"></path>
                            <path d="M17 19h4"></path>
                        </svg>
                    </button>
                </div>
    </div>
    </section>

    <section class="recipe-section" id="recipe-section">
        <!-- Recipe will be injected here -->
    </section>
    </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
